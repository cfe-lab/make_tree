name: CI

on:
  push:
    branches: ["main", "devel"]
  pull_request:
    branches: ["main", "devel"]

jobs:
  run:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libegl1 libzstd1

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest --no-cov

      - name: Run in cmd line
        run: uv run make_tree "(A,B,(C,D),E);" test.pdf "foo bar"

  test:
    name: Test and report on ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y libegl1 libzstd1

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests and track code coverage
        run: >
          uv run pytest
          --junitxml=unit_test.xml
          --cov-report xml:coverage.xml
          --cov-report term
          --cov-config=pyproject.toml
          --cov=make_tree
          --cov=tests

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: |
            unit_test.xml
            coverage.xml
